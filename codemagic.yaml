workflows:
  android-capacitor:
    name: Android Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 22          # ← Changed from 20 to 22
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Add Android platform
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - myrdpa@gmail.com
        notify:
          success: true
          failure: true
